  <style>

      padding: 24px;

    }

    .container {

      margin: auto;
    }

    .card {

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin: 8px 0;
      background: #f8fafc;
      cursor: pointer;
    }

    .option:hover {
      background: #eef6ff;
    }

    .question {
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 18px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
      margin-left: 8px;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .hidden {
      display: none;
    }

    .info-box {
      background: #eff6ff;
      border-left: 5px solid #2563eb;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 18px;
    }

    .result-pass {
      background: #dcfce7;
      color: #166534;
      border-left: 6px solid #16a34a;
    }

    .result-fail {
      background: #fee2e2;
      color: #991b1b;
      border-left: 6px solid #dc2626;
    }

    .feedback-item {
      padding: 10px 12px;
      border-radius: 12px;
      margin: 8px 0;
      background: #f8fafc;
    }

    .correct {
      border-left: 5px solid #16a34a;
    }

    .wrong {
      border-left: 5px solid #dc2626;
    }

    .small {
      font-size: 14px;
      color: #64748b;
    }

    .question-img {
      width: 100%;
      max-width: 760px;
      display: block;
      margin: 12px auto 16px auto;
      border-radius: 12px;
      border: 1px solid #e5e7eb;

</head>

<body>
  <div class="container">

    <div class="card">

      <select id="organization">

        <option>โรงพยาบาลศูนย์</option>

        จากการแต่งตั้งพนักงานเจ้าหน้าที่เพื่อปฏิบัติการ

  </div>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwRVQ9GSPbMPKEI3VESy3qy1vhG-OSAR2uIkDAt54untEHw5lus7l998oO_Wt8oqQudiA/exec";
    const IMG_Q1 = "images/fdaq1.jpg?v=20260607b";

    const IMG_Q3 = "images/fdaq3.png?v=20260607b";

    let lastAnswers = {};

    function imageHtml(src, altText) {
      return `<img class="question-img" src="${src}" alt="${escapeHtml(altText)}" onerror="this.style.display='none'; console.warn('Image not found:', this.src);">`;
    }

    function restoreAnswers(answers) {
      Object.keys(answers || {}).forEach(qid => {
        const value = cssEscapeValue(answers[qid]);
        const el = document.querySelector(`input[name="${qid}"][value="${value}"]`);
        if (el) el.checked = true;
      });
    }

    function cssEscapeValue(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }


    const AUTHORITY_POWERS = [
          "เข้าไปในสถานที่ผลิตยา สถานที่ขายยา สถานที่นำหรือสั่งยาเข้ามาในราชอาณาจักร หรือสถานที่เก็บยา ในระหว่างเวลาทำการเพื่อตรวจสอบและควบคุม",
          "นำยาในปริมาณพอสมควรไปเป็นตัวอย่างเพื่อตรวจสอบหรือวิเคราะห์",
          "ยึด หรืออายัด ยาและเครื่องมือที่ใช้ในการกระทำความผิด ตลอดจนภาชนะหรือหีบห่อบรรจุยาและเอกสารที่เกี่ยวข้องกับยาดังกล่าว",
          "ประกาศผลการตรวจสอบหรือวิเคราะห์คุณภาพของยา ที่นำไปตรวจสอบหรือวิเคราะห์ ให้ประชาชนทราบ โดยได้รับความเห็นชอบจากกรรมการ",
          "อำนาจเรียกเก็บหรือสั่งให้ผู้รับอนุญาตจัดเก็บยาคืนภายในระยะเวลาที่พนักงานเจ้าหน้าที่กำหนด และมีอำนาจทำลายยา"
        ];
    
    const QUESTIONS = [
      {
        id: "q1",
        text: "บุคคลใดไม่มีอำนาจในการสอบสวนคดี",
        options: [
          "ก. ตำรวจ",
          "ข. นายอำเภอ",

      {
        id: "q2",
        text: "ข้อใดไม่ใช่สิ่งที่พนักงานสืบสวนควรกระทำ",
        options: [
          "ก. กันบุคคลที่ไม่เกี่ยวข้องออกจากที่เกิดเหตุ",

          "ค. จัดทำพยานหลักฐานให้สอดคล้องกับข้อกล่าวหา",
          "ง. บันทึกข้อมูลเช่นบัตรประชาชนในบันทึกการตรวจ"

        answer: "ค. จัดทำพยานหลักฐานให้สอดคล้องกับข้อกล่าวหา"

        options: [
          "ก. การเตรียมข้อมูลก่อนออกตรวจสถานที่",
          "ข. การร่วมบันทึกการจับกุมและลงชื่อในบันทึกจับกุมของตำรวจ",
          "ค. ติดตามผลคดีที่ตนเองเป็นผู้กล่าวหา",

        answer: "ง. ถูกทุกข้อ"
      },
      {
        id: "q5",
        text: "ข้อใดจัดเป็นพยานหลักฐานที่ได้มาโดยไม่ชอบด้วยกฎหมาย\n1) บันทึกตรวจสถานที่ที่มีการลงนามของผู้รับอนุญาต และพนักงานเจ้าหน้าที่\n2) เทปบันทึกเสียงสนทนาระหว่างผู้กระทำผิดกับผู้ลักลอบบันทึก\n3) หลักฐานจากการล่อซื้อ",

        text: "ข้อใดจัดเป็น “ยาปลอม” ตามพระราชบัญญัติยา พ.ศ.2510",
        options: [
          "ก. ยาที่สิ้นอายุตามที่แสดงไว้ในฉลาก",
          "ข. ยาที่จำหน่ายในสถานที่ที่ไม่ได้รับอนุญาตด้านยา",

          "ง. ยาที่ผลวิเคราะห์ทางห้องปฏิบัติการตรวจพบปริมาณตัวยาสำคัญเท่ากับ 75% ของปริมาณที่ฉลากระบุไว้"
        ],
        answer: "ค. ยาที่ฉลากระบุเลขทะเบียนตำรับยาแต่ผลิตในสถานที่ที่ไม่ได้รับอนุญาต"
      },
      {
        id: "q8",
        text: "ข้อใดไม่ถูกต้องเกี่ยวกับยาสูตร 4 x 100",
        options: [
          "ก. ประกอบด้วยน้ำกระท่อมเป็นหลัก",
          "ข. สูตร 4x100 ต้องมีส่วนผสมของยาน้ำแก้ไอ",

        ],
        answer: "ข. สูตร 4x100 ต้องมีส่วนผสมของยาน้ำแก้ไอ"
      },
      {
        id: "q9",
        text: "ผู้ร้องเรียนแจ้งว่าร้านขายยา A มีการลักลอบขายยาสูตร 4 x 100 ให้กับเยาวชน เมื่อเจ้าหน้าที่ทำการล่อซื้อสามารถซื้อยา Tramadol + ยาแก้แพ้ฉลากระบุยาอันตรายได้ พบว่าคนขายเป็นลูกจ้างคนเดียวในร้านขายยาที่มีใบอนุญาตและไม่ใช่เภสัชกร ความผิดที่พบเบื้องต้นจากข้อมูลที่ได้นี้คือข้อใด\n1) พรบ.ยา มาตรา 12 ห้ามมิให้ผู้ใด ผลิต ขาย นำสั่งฯ ยาแผนปัจจุบันโดยไม่ได้รับอนุญาต\n2) พรบ.ยา มาตรา 26(6) ให้ผู้รับอนุญาตขายยาแผนปัจจุบัน จัดทำบัญชีซื้อและขายยาตามที่กำหนดในกฎกระทรวง\n3) พรบ.ยา มาตรา 32 ห้ามมิให้ผู้รับอนุญาต ขายยาอันตรายขณะเภสัชกรไม่อยู่ปฏิบัติหน้าที่\n4) พรบ.วิชาชีพเภสัชกรรม มาตรา 28 ห้ามมิให้ผู้ใดซึ่งมิได้เป็นผู้ประกอบวิชาชีพเภสัชกรรมทำการประกอบวิชาชีพเภสัชกรรม",

      AUTHORITY_POWERS.forEach((text, index) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `
          <input type="checkbox" name="authorityPower" value="${escapeHtml(text)}" />
          <span>${escapeHtml(text)}</span>
        `;
        box.appendChild(label);
      });
    }

    function renderQuestions() {
      const form = document.getElementById("quizForm");
      form.innerHTML = "";

      QUESTIONS.forEach((q, index) => {
        const div = document.createElement("div");
        div.className = "question";

        let html = `<h3>ข้อ ${index + 1}</h3><p>${escapeHtml(q.text)}</p>`;

        if (q.image) {
          html += imageHtml(q.image, "รูปประกอบคำถาม");
        }

        q.options.forEach(opt => {
          html += `
            <label class="option">
              <input type="radio" name="${q.id}" value="${escapeHtml(opt)}" />
              <span>${escapeHtml(opt)}</span>
            </label>
          `;
        });

        div.innerHTML = html;
        form.appendChild(div);
      });
    }

    function startQuiz() {
      const fullName = document.getElementById("fullName").value.trim();
      const licenseNo = document.getElementById("licenseNo").value.trim();
      const organization = document.getElementById("organization").value.trim();
      const isAuthority = getRadioValue("isAuthority");
      const powers = getCheckedValues("authorityPower");

      if (!fullName) {
        alert("กรุณากรอกชื่อ นามสกุล");
        return;
      }

      if (!isAuthority) {
        alert("กรุณาเลือกว่าท่านเป็นผู้มีอำนาจตามมาตรา 91 หรือไม่");
        return;
      }

      document.getElementById("infoSummary").innerHTML = `
        <strong>ข้อมูลผู้ทำแบบทดสอบ</strong><br>
        ชื่อ: ${escapeHtml(fullName)}<br>
        เลขใบประกอบวิชาชีพ: ${licenseNo ? escapeHtml(licenseNo) : "-"}<br>
        หน่วยงาน: ${organization ? escapeHtml(organization) : "-"}<br>
        ผู้มีอำนาจตามมาตรา 91: ${escapeHtml(isAuthority)}<br>
        อำนาจที่เลือก: ${powers.length ? escapeHtml(powers.join(", ")) : "-"}
      `;

      document.getElementById("quizSection").classList.remove("hidden");
      document.getElementById("step1").classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function submitQuiz() {
      const answers = {};
      let missing = [];

      QUESTIONS.forEach((q, index) => {
        const value = getRadioValue(q.id);
        if (!value) {
          missing.push(index + 1);
        } else {
          answers[q.id] = value;
        }
      });

      if (missing.length > 0) {
        alert("กรุณาตอบคำถามข้อ " + missing.join(", "));
        return;
      }

      let score = 0;
      QUESTIONS.forEach(q => {
        if (answers[q.id] === q.answer) score++;
      });

      const total = QUESTIONS.length;
      const percent = Math.round((score / total) * 10000) / 100;
      const passed = percent >= 70;
      lastAnswers = { ...answers };

      showResult(score, total, percent, passed, answers);

      const payload = {
        fullName: document.getElementById("fullName").value.trim(),
        licenseNo: document.getElementById("licenseNo").value.trim(),
        organization: document.getElementById("organization").value.trim(),
        isAuthority: getRadioValue("isAuthority"),
        authorityPowers: getCheckedValues("authorityPower"),
        answers: answers
      };

      postToAppsScript(payload);
    }

    function showResult(score, total, percent, passed, answers) {
      const result = document.getElementById("resultSection");
      const quizSection = document.getElementById("quizSection");

      quizSection.classList.add("hidden");
      result.classList.remove("hidden");
      result.className = "card " + (passed ? "result-pass" : "result-fail");

      const html = `
        <h2>ผลคะแนน</h2>
        <h1>${score} / ${total} คะแนน (${percent}%)</h1>
        <h2>${passed ? "ผ่านเกณฑ์" : "ยังไม่ผ่านเกณฑ์"}</h2>
        <p>ระบบได้ส่งข้อมูลไปบันทึกใน Google Sheet แล้ว</p>

        <button class="btn-primary" onclick="retryQuiz()">ทำข้อสอบใหม่</button>
        <button class="btn-secondary" onclick="editInfo()">แก้ไขข้อมูลผู้ทำ</button>
      `;

      result.innerHTML = html;
      result.scrollIntoView({ behavior: "smooth" });
    }

    function retryQuiz() {
      document.getElementById("resultSection").classList.add("hidden");
      document.getElementById("quizSection").classList.remove("hidden");

      restoreAnswers(lastAnswers);

      document.getElementById("quizSection").scrollIntoView({ behavior: "smooth" });
    }

    function editInfo() {
      document.getElementById("step1").classList.remove("hidden");
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("resultSection").classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function postToAppsScript(payload) {
      const form = document.createElement("form");
      form.method = "POST";
      form.action = GAS_URL;
      form.target = "hidden_iframe";
      form.style.display = "none";

      const input = document.createElement("input");
      input.type = "hidden";
      input.name = "payload";
      input.value = JSON.stringify(payload);

      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();

      setTimeout(() => form.remove(), 1000);
    }

    function loadNamesFromSheet() {
      if (!GAS_URL || GAS_URL.includes("PUT_YOUR")) return;

      const callbackName = "callback_" + Date.now();

      window[callbackName] = function(data) {
        if (data && data.ok && Array.isArray(data.names)) {
          const list = document.getElementById("nameList");
          list.innerHTML = "";
          data.names.forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            list.appendChild(opt);
          });
        }
        delete window[callbackName];
        script.remove();
      };

      const script = document.createElement("script");
      script.src = `${GAS_URL}?action=names&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    function getRadioValue(name) {
      const el = document.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : "";
    }

    function getCheckedValues(name) {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
        .map(el => el.value);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
